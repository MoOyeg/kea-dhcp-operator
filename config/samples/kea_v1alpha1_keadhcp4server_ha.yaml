apiVersion: kea.openshift.io/v1alpha1
kind: KeaDhcp4Server
metadata:
  name: dhcp4-ha-example
  labels:
    app.kubernetes.io/name: ocp-kea-dhcp
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2

  # --- Global timers ---
  valid-lifetime: 43200
  renew-timer: 21600
  rebind-timer: 32400

  # --- Interface configuration ---
  # Use "net1" when attaching via a NetworkAttachmentDefinition (NAD).
  interfaces-config:
    interfaces:
      - net1
    dhcp-socket-type: raw

  # --- Pod placement with NAD ---
  placement:
    podAnnotations:
      k8s.v1.cni.cncf.io/networks: "dhcp-net"

  # --- Lease persistence ---
  lease-database:
    type: memfile
    persist: true
    lfc-interval: 3600

  # --- Subnets ---
  subnet4:
    - id: 1
      subnet: "192.168.1.0/24"
      pools:
        - pool: "192.168.1.100 - 192.168.1.200"
      option-data:
        - name: routers
          data: "192.168.1.1"
        - name: domain-name-servers
          data: "8.8.8.8, 8.8.4.4"

  # --- Control socket (required for HA peer communication) ---
  control-socket:
    socket-type: unix
    socket-name: /run/kea/kea-dhcp4-ctrl.sock

  # --- High Availability ---
  high-availability:
    this-server-name: server1
    mode: load-balancing
    heartbeat-delay: 10000
    max-response-delay: 60000
    max-ack-delay: 10000
    max-unacked-clients: 10
    peers:
      - name: server1
        url: "http://kea-dhcp4-0.kea-dhcp4:8000/"
        role: primary
        auto-failover: true
      - name: server2
        url: "http://kea-dhcp4-1.kea-dhcp4:8000/"
        role: standby
        auto-failover: true

  # --- Logging ---
  loggers:
    - name: kea-dhcp4
      severity: INFO
      output-options:
        - output: stdout

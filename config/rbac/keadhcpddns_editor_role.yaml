# permissions for end users to edit keadhcpddns.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ocp-kea-dhcp
    app.kubernetes.io/managed-by: kustomize
  name: keadhcpddns-editor-role
rules:
- apiGroups:
  - kea.openshift.io
  resources:
  - keadhcpddns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kea.openshift.io
  resources:
  - keadhcpddns/status
  verbs:
  - get
